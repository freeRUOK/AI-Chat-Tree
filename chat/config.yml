usage:
  ollama_host: http://127.0.0.1:11434
  ollama_api_key: $OLLAMA_API_KEY
  chat_collection_dir: chat_collections
models:
- group_name: deepseek
  is_online: true
  show_reasoning: true
  base_url: https://api.deepseek.com
  api_key: $DEEPSEEK_API_KEY
  sub_models:
  - deepseek-reasoner
  - deepseek-chat
- group_name: qwen
  is_online: true
  show_reasoning: true
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key: $QWEN_API_KEY
  sub_models:
  - Qwen3.5-Plus
  - Qwen3.5-Plus-2026-02-15
  - qwen3-vl-plus
  - qwen3.5-397b-a17b
  - qwen-plus
  - qwen-turbo
  - qwen-max
  - qwen-flash
  - qwq-plus
  - qwen-vl-max
text_to_speech:
  voice: Microsoft Server Speech Text to Speech Voice (zh-CN, XiaoxiaoNeural)
  rate: +100%
  volume: +20%
voice_input:
  porcupine_access_key: $PORCUPINE_ACCESS_KEY
  porcupine_model_path: C:\Users\free\.models\porcupine\porcupine_params_zh.pv
  porcupine_wake_zh_model_path: C:\Users\free\.models\porcupine\黑鹰_zh_windows_v4_0_0\黑鹰_zh_windows_v4_0_0.ppn
  vosk_model_path: C:\Users\free\.models\vosk\vosk-model-small-cn-0.22
